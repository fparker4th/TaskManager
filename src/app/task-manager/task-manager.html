<div class="task-manager-container">


    <table>
        <tr>
            <th>Task Id</th>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
        </tr>
        @for (task of tasks(); track task.id; let idx = $index){
        <tr>
            <td>{{task.id}}</td>
            <td>{{task.title}}</td>
            <td>{{task.category}}</td>
            <td>{{task.priority}}</td>
            <td>{{task.status}}</td>
        </tr>
        }
    </table>
</div>
